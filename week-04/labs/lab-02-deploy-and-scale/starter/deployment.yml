apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: student-app
  name: student-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - image: localhost/student-app:v4
        name: student-app
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: STUDENT_NAME
          value: "Mohammad Siddiqi"
        - name: GITHUB_USERNAME
          value: "almsid"
        - name: APP_VERSION
          value: "v4"
        - name: ENVIRONMENT
          value: "local"
        # Kubernetes Downward API — pod metadata injected as env vars
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
